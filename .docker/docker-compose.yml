networks:
  network:
    name: ${COMPOSE_PROJECT_NAME}_${NETWORK_NAME}
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: ${SUBNET_IP}

services:
  nginx:
    build:
      context: nginx
      args:
        UID: ${USER_ID}
        GID: ${GROUP_ID}
    container_name: nginx
    working_dir: /var/www/html
    networks:
      - network
    volumes:
      - ../:/var/www/html
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/templates:/etc/nginx/templates
      - ./nginx/templates-available:/etc/nginx/templates-available
      - ./nginx/ssl/:/etc/nginx/ssl
    ports:
      - 80:80
      - 443:443

  php-fpm:
    build:
      context: php-fpm
      args:
        UID: ${USER_ID}
        GID: ${GROUP_ID}
    container_name: php-fpm
    working_dir: /var/www/html
    networks:
      - network
    volumes:
      - ../:/var/www/html
      - ./php-fpm/php-ini-overrides.ini:/usr/local/etc/php/conf.d/99-overrides.ini
      - ./nginx/ssl/:/usr/local/share/ca-certificates
      - ./php-fpm/home/:/home/appuser
    environment:
      PHP_IDE_CONFIG: "serverName=Docker"
      XDEBUG_MODE: "debug"
      XDEBUG_CONFIG: "client_host=host.docker.internal client_port=${XDEBUG_CLIENT_PORT}"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  mysql:
    image: mysql:8.0
    container_name: mysql
    networks:
      - network
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    ports:
      - ${PORT_MYSQL}:3306

  mail:
    image: mailhog/mailhog
    container_name: mail
    networks:
      - network
    ports:
      - ${PORT_MAIL_SMTP}:1025 # email test server
      - ${PORT_MAIL_GUI}:8025 # email test server

volumes:
  mysql-data:
